# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "nordictel_assets_bundle"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405608960259103.3.azuredatabricks.net

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://adb-7405608960259103.3.azuredatabricks.net
      # We always use /Users/henrik.baugerod@bouvet.no for all resources to make sure we only have a single copy.
      root_path: /Users/henrik.baugerod@bouvet.no/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as henrik.baugerod@bouvet.no in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: henrik.baugerod@bouvet.no
