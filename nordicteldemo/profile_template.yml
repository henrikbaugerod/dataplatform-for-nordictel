# This file defines prompts with defaults for dbt initializaton.
# It is used when the `dbt init` command is invoked.
#
fixed:
  type: databricks
prompts:
  host:
    default: adb-7405608960259103.3.azuredatabricks.net
  token:
    hint: 'personal access token to use, dapiXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'
    hide_input: true
  http_path:
    hint: 'HTTP path of SQL warehouse to use'
    default: /sql/1.0/warehouses/44122d4af4053aac
  catalog:
    hint: 'initial catalog'
    default: nordictel
  schema:
    hint: 'personal schema where dbt will build objects during development, example: henrik_baugerod'
  threads:
    hint: 'threads to use during development, 1 or more'
    type: 'int'
    default: 4
